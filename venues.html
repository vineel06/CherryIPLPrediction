{% extends "base.html" %}
{% block content %}
<h1 class="mb-4"><i class="bi bi-geo-alt"></i> Venues</h1>

<div class="row">
    {% for venue in venues %}
    <div class="col-md-4 mb-3">
        <div class="card">
            <div class="card-body">
                <h5>{{ venue.name }}</h5>
                <p>{{ venue.city }}</p>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
